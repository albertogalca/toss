<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src ws://localhost:3001 stun:stun.l.google.com:19302" />
  <title>Toss</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <table id="file-table">
    <thead>
      <tr>
        <th class="col-name">Name<div class="col-resize" data-col="name"></div></th>
        <th class="col-size">Size<div class="col-resize" data-col="size"></div></th>
        <th class="col-status">Status<div class="col-resize" data-col="status"></div></th>
        <th class="col-actions">Actions</th>
      </tr>
    </thead>
    <tbody id="file-list"></tbody>
  </table>

  <div id="empty-state">Drop files here to share</div>

  <div id="settings-popover">
    <div class="setting-row">
      <span class="setting-label">Light mode</span>
      <label class="toggle">
        <input type="checkbox" id="theme-toggle" />
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="bottom-left">
      <button id="settings-btn" title="Settings">&#x2699;</button>
      <span id="file-count">0 files</span>
      <span class="hint">Drag files to add</span>
    </div>
    <div id="bottom-right">
      <span id="status-dot"></span>
      <span id="status-text">Disconnected</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
